<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitFlow | Beautiful Habit Tracker</title>
    <meta name="description" content="A simple, elegant habit tracker to build your daily routines.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Habit<span class="highlight">Flow</span></h1>
            <p id="current-date"></p>
        </header>

        <section class="add-habit-section">
            <form id="add-habit-form">
                <input type="text" id="habit-input" placeholder="What habit do you want to build?" required autocomplete="off">
                <button type="submit" id="add-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </form>
        </section>

        <section class="habits-list-section">
            <div id="habits-container" class="habits-container">
                <!-- Habits will be injected here by JS -->
            </div>
            
            <div id="empty-state" class="empty-state">
                <div class="icon-placeholder">🌱</div>
                <h2>Start your journey</h2>
                <p>Add your first habit above to begin tracking your progress.</p>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
